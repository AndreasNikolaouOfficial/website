<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <style>
    :root {
      --bg: #05070a;
      --bg-soft: #0a0f14;
      --panel: rgba(10, 15, 20, 0.88);
      --line: rgba(0, 255, 163, 0.16);
      --text: #d7ffe9;
      --muted: #7fa592;
      --accent: #00ffa3;
      --accent-soft: rgba(0, 255, 163, 0.18);
      --warning: #8df8c7;
      --shadow: 0 0 30px rgba(0, 255, 163, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,255,163,0.08), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(0,255,163,0.04), transparent 25%),
        linear-gradient(180deg, #030508 0%, #05070a 40%, #020406 100%);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,163,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,163,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 55%, transparent 95%);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(0, 255, 163, 0.05) 50%, transparent 100%);
      background-size: 100% 6px;
      animation: scan 9s linear infinite;
      opacity: 0.18;
      pointer-events: none;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
      background-image: radial-gradient(#ffffff 0.4px, transparent 0.4px);
      background-size: 7px 7px;
      mix-blend-mode: screen;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      position: relative;
    }

    .terminal {
      position: relative;
      width: min(880px, 100%);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(5,7,10,0.97), rgba(7,11,15,0.88));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
      border-radius: 14px;
    }

    .terminal::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,255,163,0.08);
      pointer-events: none;
      border-radius: 14px;
    }

    .terminal::after {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg, transparent, rgba(0,255,163,0.08), transparent 35%);
      animation: rotate 14s linear infinite;
      pointer-events: none;
      opacity: 0.28;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(0,255,163,0.12);
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.18);
    }

    .bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .dots {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .dots span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(0,255,163,0.75);
      box-shadow: 0 0 10px rgba(0,255,163,0.45);
    }

    .bar small {
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 28px 22px 22px;
      display: grid;
      gap: 18px;
    }

    .prompt {
      color: var(--muted);
      font-size: 0.92rem;
      word-break: break-word;
    }

    .prompt .user {
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 7vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(0,255,163,0.16);
      word-break: break-word;
    }

    h1 span {
      display: block;
      color: var(--accent);
    }

    .sub {
      margin: 0;
      color: #b4d7c5;
      font-size: clamp(0.95rem, 2.7vw, 1rem);
      line-height: 1.7;
      max-width: 44ch;
    }

    .cmd {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      max-width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(0,255,163,0.18);
      background: rgba(0,255,163,0.06);
      color: var(--warning);
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }

    .cmd::before {
      content: ">";
      color: var(--accent);
      flex-shrink: 0;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 16px;
      margin-top: 4px;
      border-top: 1px solid rgba(0,255,163,0.12);
      color: var(--muted);
      font-size: 0.84rem;
    }

    .blink {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      background: var(--accent);
      vertical-align: -2px;
      margin-left: 8px;
      animation: blink 1s steps(1) infinite;
      box-shadow: 0 0 12px rgba(0,255,163,0.45);
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    @media (max-width: 640px) {
      html, body {
        overflow: auto;
      }

      .wrap {
        min-height: 100svh;
        padding: 14px;
      }

      .terminal {
        border-radius: 12px;
      }

      .terminal::before {
        border-radius: 12px;
      }

      .bar {
        padding: 12px 14px;
      }

      .content {
        padding: 22px 14px 16px;
        gap: 16px;
      }

      .prompt {
        font-size: 0.82rem;
      }

      .cmd {
        width: 100%;
        font-size: 0.84rem;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <main class="wrap">
    <section class="terminal" aria-label="Under construction notice">
      <div class="bar">
        <div class="bar-left">
          <div class="dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <small>root@server:~ / maintenance-shell</small>
        </div>
        <small>linux mode</small>
      </div>

      <div class="content">
        <div class="prompt"><span class="user">root@host</span>:~# ./launch-website.sh</div>

        <h1>
          Under
          <span>Construction</span>
        </h1>

        <p class="sub">
          System hardening in progress.<span class="blink" aria-hidden="true"></span>
        </p>

        <div class="cmd">website status: initializing</div>

        <div class="footer">
          <span>&gt; online soon</span>
          <span>&copy; 2026</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
